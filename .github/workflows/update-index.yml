name: Update Tool Index

on:
  push:
    branches: [main]
    paths:
      - 'tools/*/tool.json'

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate index.json
        run: |
          echo '[' > tools/index.json.tmp
          first=true
          for dir in tools/*/; do
            if [ -f "${dir}tool.json" ]; then
              tool=$(cat "${dir}tool.json" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)['tool']
          entry = {
            'slug': data['slug'],
            'name': data['name'],
            'displayName': data['displayName'],
            'description': data['description'],
            'category': data['category'],
            'author': data['author'],
            'tags': data.get('tags', []),
            'updatedAt': data.get('updatedAt', '')
          }
          print(json.dumps(entry, ensure_ascii=False))
          ")
              if [ "$first" = true ]; then
                first=false
              else
                echo ',' >> tools/index.json.tmp
              fi
              echo "  $tool" >> tools/index.json.tmp
            fi
          done
          echo '' >> tools/index.json.tmp
          echo ']' >> tools/index.json.tmp
          python3 -c "import json; data=json.load(open('tools/index.json.tmp')); json.dump(data, open('tools/index.json','w'), indent=2, ensure_ascii=False)"
          rm tools/index.json.tmp

      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/index.json
          git diff --cached --quiet || git commit -m "chore: update tool index"
          git push
